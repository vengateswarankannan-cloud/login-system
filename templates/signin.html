<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: linear-gradient(to right, #36d1dc, #5b86e5);
    }
    .box {
      width: 100%;
      max-width: 360px;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,.2);
    }
    h2 { text-align: center; margin-bottom: 20px; color: #333; }
    .field { margin-bottom: 15px; }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #333;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 11px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      font-size: 14px;
      transition: .2s;
    }
    input:focus {
      border-color: #5b86e5;
      box-shadow: 0 0 0 3px rgba(91, 134, 229, .12);
    }
    input.invalid { border-color: #cc0000; }
    input.valid { border-color: #18a558; }
    small {
      display: block;
      margin-top: 5px;
      font-size: 12px;
      min-height: 16px;
    }
    .error {
      display: none;
      background: #ffe0e0;
      color: #cc0000;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 14px;
      text-align: center;
    }
    .error.show { display: block; }
    .password-wrap { position: relative; }
    .toggle-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: #5b86e5;
      cursor: pointer;
      font-size: 13px;
      padding: 4px 6px;
    }
    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #5b86e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
    }
    button[type="submit"]:hover { background: #3f6fd1; }
    p { text-align: center; margin-top: 18px; font-size: 14px; }
    a { color: #5b86e5; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="box">
    <h2>Sign In</h2>

    <div class="error {% if error %}show{% endif %}" id="formError" role="alert" aria-live="polite">
      {% if error %}{{ error }}{% endif %}
    </div>

    <form action="{{ url_for('signin') }}" method="POST" id="signinForm" novalidate>
      <div class="field">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email"
          maxlength="100"
          autocomplete="username"
          required
          aria-describedby="emailHint"
        />
        <small id="emailHint"></small>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            minlength="6"
            autocomplete="current-password"
            required
            aria-describedby="passwordHint"
          />
          <button type="button" class="toggle-btn" id="togglePassword">Show</button>
        </div>
        <small id="passwordHint"></small>
      </div>

      <button type="submit">Sign In</button>
    </form>

    <p>Don't have an account?  <a href="{{ url_for('signup') }}">Sign Up</a></p>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("signinForm");
      const email = document.getElementById("email");
      const password = document.getElementById("password");
      const emailHint = document.getElementById("emailHint");
      const passwordHint = document.getElementById("passwordHint");
      const formError = document.getElementById("formError");
      const togglePassword = document.getElementById("togglePassword");

      const emailPattern = /^[^\s@]+@[^\s@]+\.[A-Za-z]{2,}$/;

      function showError(message) {
        formError.textContent = message;
        formError.classList.add("show");
      }

      function clearError() {
        formError.textContent = "";
        formError.classList.remove("show");
      }

      function setFieldState(field, isValid) {
        field.classList.toggle("valid", isValid);
        field.classList.toggle("invalid", !isValid);
      }

      email.addEventListener("blur", function () {
        const value = email.value.trim();
        if (!value) {
          emailHint.textContent = "Email is required.";
          emailHint.style.color = "#cc0000";
          setFieldState(email, false);
          return;
        }
        if (!emailPattern.test(value)) {
          emailHint.textContent = "Please enter a valid email address.";
          emailHint.style.color = "#cc0000";
          setFieldState(email, false);
          return;
        }
        emailHint.textContent = "";
        setFieldState(email, true);
      });

      password.addEventListener("input", function () {
        if (password.value.length > 0 && password.value.length < 6) {
          passwordHint.textContent = "Password must be at least 6 characters.";
          passwordHint.style.color = "#cc0000";
          setFieldState(password, false);
        } else if (password.value.length >= 6) {
          passwordHint.textContent = "";
          setFieldState(password, true);
        } else {
          passwordHint.textContent = "";
          password.classList.remove("valid", "invalid");
        }
      });

      togglePassword.addEventListener("click", function () {
        const isHidden = password.type === "password";
        password.type = isHidden ? "text" : "password";
        togglePassword.textContent = isHidden ? "Hide" : "Show";
      });

      form.addEventListener("submit", function (e) {
        clearError();
        const emailValue = email.value.trim();
        const passwordValue = password.value.trim();

        if (!emailValue || !emailPattern.test(emailValue)) {
          showError("Please enter a valid email address.");
          email.focus();
          e.preventDefault();
          return;
        }
        if (!passwordValue || passwordValue.length < 6) {
          showError("Password must be at least 6 characters.");
          password.focus();
          e.preventDefault();
          return;
        }
      });
    });
  </script>
</body>
</html>
