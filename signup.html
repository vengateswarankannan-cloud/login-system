<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>

<div class="card">
    <h2>Create Account</h2>

    <form action="/register" method="POST" id="signupForm">
        <div class="field">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter full name" required>
        </div>

        <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter email" required>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
            <small id="passwordHint"></small>
        </div>

        <div class="field">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm password" required>
            <small id="confirmHint"></small>
        </div>

        <button type="submit" id="submitBtn">Sign Up</button>
    </form>

    <p>
        Already have an account?
        <a href="/signin">Sign In</a>
    </p>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("signupForm");
    const nameInput = document.getElementById("name");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const confirmInput = document.getElementById("confirm_password");
    const passwordHint = document.getElementById("passwordHint");
    const confirmHint = document.getElementById("confirmHint");

    form.addEventListener("submit", function (event) {
        const name = nameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        const confirmPassword = confirmInput.value.trim();

        if (name === "") {
            alert("Please enter your full name.");
            event.preventDefault();
            return;
        }

        if (email === "") {
            alert("Please enter your email.");
            event.preventDefault();
            return;
        }

        if (password.length < 6) {
            alert("Password must be at least 6 characters.");
            event.preventDefault();
            return;
        }

        if (password !== confirmPassword) {
            alert("Passwords do not match.");
            event.preventDefault();
            return;
        }

        alert("Signup data sending to MySQL...");
    });

    passwordInput.addEventListener("input", function () {
        if (passwordInput.value.length > 0 && passwordInput.value.length < 6) {
            passwordHint.textContent = "Password must be at least 6 characters.";
            passwordHint.style.color = "red";
        } else {
            passwordHint.textContent = "";
        }
    });

    confirmInput.addEventListener("input", function () {
        if (confirmInput.value === "") {
            confirmHint.textContent = "";
            return;
        }

        if (confirmInput.value !== passwordInput.value) {
            confirmHint.textContent = "Passwords do not match.";
            confirmHint.style.color = "red";
        } else {
            confirmHint.textContent = "Passwords match.";
            confirmHint.style.color = "green";
        }
    });
});
</script>

</body>
</html>
